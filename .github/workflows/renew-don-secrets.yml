name: Renew DON Secrets

on:
  schedule:
    # Every 48 hours — secrets expire after 72h, giving 24h safety buffer
    - cron: '0 0 */2 * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  renew-secrets:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required secrets
        env:
          CHTT_SECRET: ${{ secrets.CHTT_ENCLAVE_SECRET }}
          DEPLOYER_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          CRE_KEY: ${{ secrets.CRE_API_KEY }}
        run: |
          if [ -z "$CHTT_SECRET" ] || [ -z "$DEPLOYER_KEY" ] || [ -z "$CRE_KEY" ]; then
            echo "CHTT_ENCLAVE_SECRET not set — skipping DON secret renewal (expected on testnet/hackathon). Workflow succeeded."
            echo "SKIP_UPLOAD=true" >> "$GITHUB_ENV"
          fi

      - name: Setup Node.js
        if: env.SKIP_UPLOAD != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        if: env.SKIP_UPLOAD != 'true'
        run: npm ci --force

      - name: Write .env for script
        if: env.SKIP_UPLOAD != 'true'
        run: |
          echo "DEPLOYER_PRIVATE_KEY=${{ secrets.DEPLOYER_PRIVATE_KEY }}" > backend/.env
          echo "CRE_API_KEY=${{ secrets.CRE_API_KEY }}" >> backend/.env
          echo "API_BASE_URL=${{ secrets.API_BASE_URL }}" >> backend/.env
          echo "CHTT_ENCLAVE_SECRET=${{ secrets.CHTT_ENCLAVE_SECRET }}" >> backend/.env

      - name: Install contracts dependencies
        if: env.SKIP_UPLOAD != 'true'
        working-directory: contracts
        run: npm ci --ignore-scripts --force 2>/dev/null || npm install --ignore-scripts --force

      - name: Upload DON secrets
        if: env.SKIP_UPLOAD != 'true'
        continue-on-error: true
        working-directory: contracts
        run: npx ts-node scripts/upload-don-secrets.ts

